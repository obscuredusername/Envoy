<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
      <body>
        <div class="flex-container print-dialog" >
 
          <div>
            <h1 ><i class="fa fa-print"> </i> Print</h1>
            <p>
                Do you want to print the list in a grid-layout, all individual forms in detail, or blank template form?
            </p>
            <ul class="list">
                <li>Print List<i class="arrow right"></i></li>
                <li>Print All Form<i class="arrow right"></i></li>
                <li>Print Blank Template <i class="arrow right"></i></li>

            </ul>
        </div>
          <div>
            <button class="close-button" aria-label="Close alert" type="button" data-close>
                <span aria-hidden="true">&times;</span>
              </button>
              <h1><i class="fa fa-bars"> </i> Export</h1>
            <p>
                Export this page to your clipboard, to a CSV, Excel, or as a PDF.
            </p>
            <ul class="list">
                <li>Copy <i class="arrow right"></i></li>
                <li>CSV<i class="arrow right"></i></li>
                <li>Excel<i class="arrow right"></i></li>
                <li>PDF<i class="arrow right"></i> </li>
            </ul>
        </div> 
        </div>
    
    </body>
